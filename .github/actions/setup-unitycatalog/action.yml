name: "Set up pinned Unity Catalog build"
description: >-
  Publishes Unity Catalog jars from the commit pinned in project/scripts/setup_unitycatalog_main.sh
  (the UC_PIN_SHA= line) to the runner's local Ivy / Maven caches, using GitHub Actions cache so the
  slow UC build only runs the first time a pin is seen. Produces the UC version as an output for
  callers that want to pass -DunityCatalogVersion.

outputs:
  uc_version:
    description: "The Unity Catalog version that was published (e.g. 0.5.0-SNAPSHOT-<sha>)."
    value: ${{ steps.resolve.outputs.uc_version }}

runs:
  using: "composite"
  steps:
    - name: Restore pinned UC cache
      uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        # ~/.ivy2/local is what sbt publishLocal writes to. ~/.m2 is for publishM2.
        path: |
          ~/.ivy2/local
          ~/.m2/repository/io/unitycatalog
        # Cache key hashes the setup script, so bumping UC_PIN_SHA (or any other script change)
        # invalidates the cache.
        key: uc-jars-${{ runner.os }}-${{ hashFiles('project/scripts/setup_unitycatalog_main.sh') }}
    - name: Build Unity Catalog from pinned SHA
      shell: bash
      run: bash project/scripts/setup_unitycatalog_main.sh
    - name: Save pinned UC cache
      # Always try to save: the key embeds the script hash, so writes are idempotent across PRs
      # and branches (same script -> same jars). Saving on PRs means the first workflow in a PR
      # populates the cache for the remaining workflows, avoiding N parallel UC rebuilds on pin
      # bumps.
      uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: |
          ~/.ivy2/local
          ~/.m2/repository/io/unitycatalog
        key: uc-jars-${{ runner.os }}-${{ hashFiles('project/scripts/setup_unitycatalog_main.sh') }}
    - name: Resolve UC version
      id: resolve
      shell: bash
      run: |
        UC_VERSION=$(bash project/scripts/setup_unitycatalog_main.sh --print-version)
        echo "uc_version=$UC_VERSION" >> "$GITHUB_OUTPUT"
        echo "UC version: $UC_VERSION"
