name: "Delta Flink"

on: [push, pull_request]

# Cancel previous runs when new commits are pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  # Point SBT to our cache directories for consistency
  SBT_OPTS: "-Dsbt.coursier.home-dir=/home/runner/.cache/coursier -Dsbt.ivy.home=/home/runner/.ivy2"
  UNITY_CATALOG_VERSION: "0.5.0-SNAPSHOT"

jobs:
  test:
    name: "DF"
    runs-on: ubuntu-24.04
    steps:
      - name: Show runner specs
        run: |
          echo "=== GitHub Runner Specs ==="
          echo "CPU cores: $(nproc)"
          echo "CPU info: $(lscpu | grep 'Model name' | cut -d':' -f2 | xargs)"
          echo "Total RAM: $(free -h | grep '^Mem:' | awk '{print $2}')"
          echo "Available RAM: $(free -h | grep '^Mem:' | awk '{print $7}')"
          echo "Disk space: $(df -h / | tail -1 | awk '{print $2 " total, " $4 " available"}')"
          echo "Runner OS: ${{ runner.os }}"
          echo "Runner arch: ${{ runner.arch }}"
      - name: Checkout code
        uses: actions/checkout@v4
      # Run unit tests with JDK 17. These unit tests depend on Spark, and Spark 4.0+ is JDK 17.
      - name: install java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
      - name: Cache SBT and dependencies
        id: cache-sbt
        uses: actions/cache@v4
        with:
          path: |
            ~/.sbt
            ~/.ivy2/cache
            ~/.coursier/cache
            ~/.cache/coursier
          key: sbt-flink
      - name: Check cache status
        run: |
          if [ "${{ steps.cache-sbt.outputs.cache-hit }}" == "true" ]; then
            echo "✅ Cache HIT - using cached dependencies"
          else
            echo "❌ Cache MISS - will download dependencies"
          fi
      - name: Setup Unity Catalog for testing
        run: |
          export COURSIER_PARALLEL_DOWNLOAD_COUNT=1
          git clone --depth 1 --branch atomic-rtas https://github.com/TimothyW553/unitycatalog.git /tmp/unitycatalog
          cd /tmp/unitycatalog
          ./build/sbt "set Global / concurrentRestrictions := Seq(Tags.limitAll(1))" "set client / Compile / packageDoc / publishArtifact := false" client/generate client/publishM2
          cd "$GITHUB_WORKSPACE"
          export DELTA_VERSION="$(sed -n 's/^ThisBuild \/ version := \"\(.*\)\"$/\1/p' version.sbt)"
          export SPARK_VERSION=4.0.0
          ./build/sbt "set Global / concurrentRestrictions := Seq(Tags.limitAll(1))" "set kernelApi / Compile / doc / sources := Nil" "set kernelApi / Compile / packageDoc / publishArtifact := false" kernelApi/publishM2
          ./build/sbt "set Global / concurrentRestrictions := Seq(Tags.limitAll(1))" "set kernelDefaults / Compile / doc / sources := Nil" "set kernelDefaults / Compile / packageDoc / publishArtifact := false" kernelDefaults/publishM2
          ./build/sbt "set Global / concurrentRestrictions := Seq(Tags.limitAll(1))" "set storage / Compile / doc / sources := Nil" "set storage / Compile / packageDoc / publishArtifact := false" storage/publishM2
          ./build/sbt "++ 2.13.16" "set Global / concurrentRestrictions := Seq(Tags.limitAll(1))" "set spark / Compile / doc / sources := Nil" "set spark / Compile / packageDoc / publishArtifact := false" spark/publishM2
          cd /tmp/unitycatalog
          ./build/sbt "set Global / concurrentRestrictions := Seq(Tags.limitAll(1))" "set server / Compile / packageDoc / publishArtifact := false" server/publishM2
          ./build/sbt "set Global / concurrentRestrictions := Seq(Tags.limitAll(1))" "set spark / Compile / packageDoc / publishArtifact := false" spark/publishM2
      - name: Run unit tests
        run: |
          build/sbt flinkGroup/test
