## Non-blocking CI job that runs UC integration tests against Unity Catalog built
## from source (main branch). This gives early warning of upcoming UC
## incompatibilities without blocking PR merges.
##
## To make this blocking, add the job name to the required status checks in
## the branch protection rules for `master`.

name: "Delta Spark (UC Master)"
on:
  push:
    branches: [master, branch-*]
    paths-ignore:
      - '**.md'
      - '**.txt'
  pull_request:
    branches: [master, branch-*]
    paths-ignore:
      - '**.md'
      - '**.txt'

jobs:
  test-uc-master:
    name: "[Non Blocking] UC Integration Tests (UC Main)"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
      - name: install java
        uses: actions/setup-java@17f84c3641ba7b8f6deff6309fc4c864478f5d62 # v3
        with:
          distribution: "zulu"
          java-version: "17"
      - name: Cache Scala, SBT, Maven local
        uses: actions/cache@6f8efc29b200d32929f49075959781ed54ec270c # v3
        with:
          path: |
            ~/.sbt
            ~/.ivy2
            ~/.m2
            ~/.cache/coursier
          key: delta-sbt-cache-uc-master
      - name: Build Unity Catalog from source
        id: uc-build
        run: |
          bash project/scripts/setup_unitycatalog_main.sh
          UC_VERSION=$(cat /tmp/unitycatalog/.uc-version)
          echo "uc_version=$UC_VERSION" >> $GITHUB_OUTPUT
          echo "UC version: $UC_VERSION"
      - name: Run UC integration tests
        id: tests
        continue-on-error: true
        run: |
          build/sbt \
            -DunityCatalogVersion=${{ steps.uc-build.outputs.uc_version }} \
            sparkUnityCatalog/test kernelUnityCatalog/test
      - name: Report test results
        if: always()
        run: |
          if [[ "${{ steps.tests.outcome }}" == "failure" ]]; then
            echo "::warning::UC master integration tests failed — this is a non-blocking signal. Check test logs for details."
          else
            echo "UC master integration tests passed."
          fi
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-reports-uc-master
          path: "**/target/test-reports/*.xml"
          retention-days: 7
