## Non-blocking CI job that runs UC integration tests against Unity Catalog built
## from source (main branch). This gives early warning of upcoming UC
## incompatibilities without blocking PR merges.
##
## To make this blocking, add the job name to the required status checks in
## the branch protection rules for `master`.

name: "Delta Spark (UC Master)"
on:
  push:
    paths-ignore:
      - '**.md'
      - '**.txt'
  pull_request:
    paths-ignore:
      - '**.md'
      - '**.txt'

jobs:
  test-uc-master:
    name: "UC Integration Tests (UC Main)"
    runs-on: ubuntu-24.04
    env:
      UNITY_CATALOG_VERSION: 0.5.0-SNAPSHOT
    steps:
      - uses: actions/checkout@v3
      - name: Get default Spark version details
        id: spark-details
        run: |
          SPARK_VERSION=$(python3 project/scripts/get_spark_version_info.py --default-spark-version | jq -r '.[0]')
          JVM_VERSION=$(python3 project/scripts/get_spark_version_info.py --get-field "$SPARK_VERSION" targetJvm | jq -r)
          echo "spark_version=$SPARK_VERSION" >> $GITHUB_OUTPUT
          echo "jvm_version=$JVM_VERSION" >> $GITHUB_OUTPUT
          echo "Using Spark $SPARK_VERSION with JVM $JVM_VERSION"
      - name: install java
        uses: actions/setup-java@v3
        with:
          distribution: "zulu"
          java-version: ${{ steps.spark-details.outputs.jvm_version }}
      - name: Cache Scala, SBT, Maven local
        uses: actions/cache@v3
        with:
          path: |
            ~/.sbt
            ~/.ivy2
            ~/.m2
            ~/.cache/coursier
          key: delta-sbt-cache-uc-master-spark${{ steps.spark-details.outputs.spark_version }}
      - name: Build Unity Catalog from source
        run: bash project/scripts/setup_unitycatalog_main.sh
      - name: Run UC integration tests
        run: |
          build/sbt \
            -DsparkVersion=${{ steps.spark-details.outputs.spark_version }} \
            -DunityCatalogVersion=${{ env.UNITY_CATALOG_VERSION }} \
            sparkUnityCatalog/test kernelUnityCatalog/test
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-uc-master
          path: "**/target/test-reports/*.xml"
          retention-days: 7
