name: "Integration Tests (Release Validation)"

on:
  pull_request:
    #    branches:
    #      - 'branch-*'
    paths-ignore:
      - '**.md'
      - '**.txt'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  SBT_OPTS: "-Dsbt.coursier.home-dir=/home/runner/.cache/coursier -Dsbt.ivy.home=/home/runner/.ivy2"
  # SECURITY: Temporal lockdown — refuse any package version published after this date.
  # This date is a pre-attack baseline (before the active PyPI supply chain attack).
  UV_EXCLUDE_NEWER: "2026-03-10T00:00:00Z"

jobs:
  generate-spark-info:
    name: "Generate Spark Version Info"
    runs-on: ubuntu-24.04
    outputs:
      spark_full_version_list: ${{ steps.generate.outputs.spark_full_version_list }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
      - name: Set up uv
        run: bash project/scripts/install-uv.sh
      - name: Generate Spark version info
        id: generate
        run: |
          RELEASED=$(uv run python3 project/scripts/get_spark_version_info.py --released-spark-versions)
          FULL_VERSION_LIST="[]"
          for SHORT in $(echo "$RELEASED" | jq -r '.[]'); do
            FULL=$(uv run python3 project/scripts/get_spark_version_info.py --get-field "$SHORT" fullVersion | jq -r)
            FULL_VERSION_LIST=$(echo "$FULL_VERSION_LIST" | jq -c --arg v "$FULL" '. + [$v]')
          done
          echo "spark_full_version_list=$FULL_VERSION_LIST" >> $GITHUB_OUTPUT
          echo "Full version list: $FULL_VERSION_LIST"

  scala-python-integration:
    name: "Scala + Python Integration"
    needs: generate-spark-info
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
      - name: Set up uv
        run: bash project/scripts/install-uv.sh
      - name: Cache SBT and Coursier dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.sbt
            ~/.ivy2/cache
            ~/.coursier/cache
            ~/.cache/coursier
          key: sbt-integration-${{ runner.os }}-${{ hashFiles('build.sbt', 'project/**') }}
          restore-keys: sbt-integration-${{ runner.os }}-
      - name: Cache Spark distributions
        uses: actions/cache@v4
        with:
          path: ~/spark-*-bin-hadoop3
          key: spark-dist-${{ runner.os }}-${{ needs.generate-spark-info.outputs.spark_full_version_list }}
      - name: Download Spark distributions
        run: bash project/scripts/install-spark.sh '${{ needs.generate-spark-info.outputs.spark_full_version_list }}'
      - name: Run Scala + Python integration tests
        run: uv run python run-integration-tests.py --use-local --no-pip

  iceberg-integration:
    name: "Iceberg Integration"
    needs: generate-spark-info
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
      - name: Set up uv
        run: bash project/scripts/install-uv.sh
      - name: Cache SBT and Coursier dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.sbt
            ~/.ivy2/cache
            ~/.coursier/cache
            ~/.cache/coursier
          key: sbt-integration-${{ runner.os }}-${{ hashFiles('build.sbt', 'project/**') }}
          restore-keys: sbt-integration-${{ runner.os }}-
      - name: Cache Spark distributions
        uses: actions/cache@v4
        with:
          path: ~/spark-*-bin-hadoop3
          key: spark-dist-${{ runner.os }}-${{ needs.generate-spark-info.outputs.spark_full_version_list }}
      - name: Download Spark distributions
        run: bash project/scripts/install-spark.sh '${{ needs.generate-spark-info.outputs.spark_full_version_list }}'
      - name: Run Iceberg integration tests
        run: uv run python run-integration-tests.py --use-local --run-iceberg-integration-tests --iceberg-lib-version 1.10.1
