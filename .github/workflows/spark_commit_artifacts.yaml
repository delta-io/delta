name: "Spark Source Artifact Cache"

on:
  workflow_dispatch:
    inputs:
      spark-version:
        description: "Spark compatibility line used for Delta shims"
        required: true
        default: "4.2"
        type: string
      spark-source-ref:
        description: "Optional Apache Spark source ref override; blank uses the CrossSparkVersions default for spark-version"
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  build-cache:
    name: "Cache Spark ${{ inputs['spark-version'] }} ${{ inputs['spark-source-ref'] || 'default ref' }}"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

      - name: Set up JDK 17
        uses: actions/setup-java@17f84c3641ba7b8f6deff6309fc4c864478f5d62 # v3.14.1
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Resolve Spark source build
        id: spark-source
        env:
          SPARK_VERSION: ${{ inputs['spark-version'] }}
          SPARK_SOURCE_REF: ${{ inputs['spark-source-ref'] }}
        run: |
          # Resolves the Spark compatibility line, optional manual source-ref override,
          # full immutable Spark SHA, and commit-qualified local Maven artifact version.
          python3 project/scripts/resolve_spark_source_build.py \
            --spark-version "$SPARK_VERSION" \
            --spark-source-ref "$SPARK_SOURCE_REF"

      - name: Restore Spark Maven cache
        id: spark-cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.m2/repository/org/apache/spark
          # This key intentionally matches the source-built Spark consumer lane in
          # spark_test.yaml. The key is exact and has no restore-keys: restoring a
          # different Spark SHA or artifact base version would silently test the
          # wrong Spark artifacts.
          key: spark-m2-ubuntu-24.04-scala-2.13-${{ steps.spark-source.outputs.spark_version }}-${{ steps.spark-source.outputs.artifact_base_version }}-${{ steps.spark-source.outputs.spark_sha }}-${{ hashFiles('project/scripts/build_spark.sh') }}

      - name: Build Spark source ref locally
        if: steps.spark-cache.outputs.cache-hit != 'true'
        id: spark-build
        env:
          SPARK_SOURCE_REF: ${{ steps.spark-source.outputs.source_ref }}
          SPARK_VERSION: ${{ steps.spark-source.outputs.spark_version }}
          SPARK_BASE_VERSION: ${{ steps.spark-source.outputs.artifact_base_version }}
          SPARK_ARTIFACT_VERSION: ${{ steps.spark-source.outputs.spark_artifact_version }}
        run: bash project/scripts/build_spark.sh

      - name: Save Spark Maven cache
        if: steps.spark-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.m2/repository/org/apache/spark
          key: spark-m2-ubuntu-24.04-scala-2.13-${{ steps.spark-source.outputs.spark_version }}-${{ steps.spark-source.outputs.artifact_base_version }}-${{ steps.spark-source.outputs.spark_sha }}-${{ hashFiles('project/scripts/build_spark.sh') }}
