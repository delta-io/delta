name: "Spark Source Artifact Cache"

on:
  workflow_dispatch:
    inputs:
      spark-version:
        description: "Spark compatibility line used for Delta shims"
        required: true
        default: "4.2"
        type: string
      spark-source-ref:
        description: "Optional Apache Spark source ref override; blank uses the CrossSparkVersions default for spark-version"
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  build-cache:
    name: "Cache Spark ${{ inputs.spark-version }} ${{ inputs.spark-source-ref || 'default ref' }}"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

      - name: Set up JDK 17
        uses: actions/setup-java@17f84c3641ba7b8f6deff6309fc4c864478f5d62 # v3.14.1
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Get Spark source build settings
        id: spark-source-settings
        env:
          SPARK_VERSION: ${{ inputs.spark-version }}
          SPARK_SOURCE_REF_OVERRIDE: ${{ inputs.spark-source-ref }}
        run: |
          DEFAULT_SOURCE_REF="$(python3 project/scripts/get_spark_version_info.py --get-field "$SPARK_VERSION" sourceBuildDefaultRef | jq -r)"
          if [[ -n "${SPARK_SOURCE_REF_OVERRIDE// }" ]]; then
            SPARK_SOURCE_REF="$SPARK_SOURCE_REF_OVERRIDE"
            echo "Using manual Spark source ref override: $SPARK_SOURCE_REF"
          elif [[ -n "$DEFAULT_SOURCE_REF" && "$DEFAULT_SOURCE_REF" != "null" ]]; then
            SPARK_SOURCE_REF="$DEFAULT_SOURCE_REF"
            echo "Using default Spark source ref from CrossSparkVersions.scala: $SPARK_SOURCE_REF"
          else
            echo "::error::No default Spark source ref is configured for Spark $SPARK_VERSION. Provide spark-source-ref or add sourceBuildDefaultRef to CrossSparkVersions.scala."
            exit 1
          fi

          ARTIFACT_BASE_VERSION="$(python3 project/scripts/get_spark_version_info.py --get-field "$SPARK_VERSION" sourceBuildArtifactBaseVersion | jq -r)"
          if [[ "$ARTIFACT_BASE_VERSION" == "null" ]]; then
            ARTIFACT_BASE_VERSION=""
          fi

          echo "source_ref=$SPARK_SOURCE_REF" >> "$GITHUB_OUTPUT"
          echo "artifact_base_version=$ARTIFACT_BASE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Resolve Spark source ref
        id: spark-ref
        env:
          SPARK_SOURCE_REF: ${{ steps.spark-source-settings.outputs.source_ref }}
        run: |
          # Resolve branch names, tags, and short SHAs to a full immutable SHA before
          # cache lookup so producer and consumer workflows use the same cache key.
          git init /tmp/spark
          git -C /tmp/spark remote add origin https://github.com/apache/spark.git
          git -C /tmp/spark fetch --depth 1 origin "$SPARK_SOURCE_REF"
          SPARK_SHA="$(git -C /tmp/spark rev-parse FETCH_HEAD)"
          echo "spark_sha=$SPARK_SHA" >> "$GITHUB_OUTPUT"
          echo "Resolved Spark source ref $SPARK_SOURCE_REF to $SPARK_SHA"

      - name: Restore Spark Maven cache
        id: spark-cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.m2/repository/org/apache/spark
          # This key intentionally matches the source-built Spark consumer lane in
          # spark_test.yaml. A cache hit skips the build below; a miss builds once
          # and saves the artifacts under the resolved Spark SHA.
          key: spark-m2-ubuntu-24.04-scala-2.13-${{ inputs.spark-version }}-${{ steps.spark-ref.outputs.spark_sha }}-${{ hashFiles('project/scripts/build_spark.sh') }}

      - name: Build Spark source ref locally
        if: steps.spark-cache.outputs.cache-hit != 'true'
        id: spark-build
        env:
          SPARK_SOURCE_REF: ${{ steps.spark-source-settings.outputs.source_ref }}
          SPARK_VERSION: ${{ inputs.spark-version }}
          SPARK_BASE_VERSION: ${{ steps.spark-source-settings.outputs.artifact_base_version }}
        run: bash project/scripts/build_spark.sh

      - name: Save Spark Maven cache
        if: steps.spark-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.m2/repository/org/apache/spark
          key: spark-m2-ubuntu-24.04-scala-2.13-${{ inputs.spark-version }}-${{ steps.spark-ref.outputs.spark_sha }}-${{ hashFiles('project/scripts/build_spark.sh') }}
