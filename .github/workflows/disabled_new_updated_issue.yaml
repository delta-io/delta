name: Add new and updated issues to Needs Review [DISABLED]

env:
  eng_usernames: allisonport-db scottsand-db tdas vkorukanti zsxwing
  devrel_usernames: dennyglee MrPowers nkarpov vinijaiswal

on:
# manual-only, auto triggers removed
  workflow_dispatch:

jobs:
  automate-new-updated-issues:
    if: false
    runs-on: ubuntu-latest
    steps:
    - name: Move to Needs Review (ENG)
      if: ${{ github.event.issue.assignee != null && contains(env.eng_usernames,
        github.event.issue.assignee.login) }}
      uses: alex-page/github-project-automation-plus@bb266ff4dde9242060e2d5418e120a133586d488 # v0.8.1
      with:
        project: oss-delta-issues
        column: Needs Review (ENG)
        repo-token: ${{ secrets.PROJECT_BOARD_AUTOMATION_TOKEN }}
    - name: Move to Needs Review
      if: ${{ github.event.issue.assignee == null || 
        contains(env.devrel_usernames, github.event.issue.assignee.login) }}
      uses: alex-page/github-project-automation-plus@bb266ff4dde9242060e2d5418e120a133586d488 # v0.8.1
      with:
        project: oss-delta-issues
        column: Needs Review
        repo-token: ${{ secrets.PROJECT_BOARD_AUTOMATION_TOKEN }}
