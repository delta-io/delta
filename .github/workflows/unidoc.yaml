  name: "Unidoc"
  on: [push, pull_request]
  jobs:
    build:
      name: "U: Scala ${{ matrix.scala }}"
      runs-on: ubuntu-24.04
      env:
        UNITY_CATALOG_VERSION: 0.5.0-SNAPSHOT
      strategy:
        matrix:
          # These Scala versions must match those in the build.sbt
          scala: [2.13.16]
      steps:
        - name: install java
          uses: actions/setup-java@v3
          with:
            distribution: "zulu"
            java-version: "17"
        - uses: actions/checkout@v3
        - name: Setup Unity Catalog for testing
          run: |
            git clone --depth 1 --branch atomic-rtas https://github.com/TimothyW553/unitycatalog.git /tmp/unitycatalog
            cd /tmp/unitycatalog
            export COURSIER_PARALLEL_DOWNLOAD_COUNT=1
            ./build/sbt "set Global / concurrentRestrictions := Seq(Tags.limitAll(1))" "set client / Compile / packageDoc / publishArtifact := false" client/publishM2
            ./build/sbt "set Global / concurrentRestrictions := Seq(Tags.limitAll(1))" "set server / Compile / packageDoc / publishArtifact := false" server/publishM2
            ./build/sbt "set Global / concurrentRestrictions := Seq(Tags.limitAll(1))" "set spark / Compile / packageDoc / publishArtifact := false" spark/publishM2
        - name: generate unidoc
          run: build/sbt "++ ${{ matrix.scala }}" unidoc
