  name: "Unidoc"
  on: [push, pull_request]
  jobs:
    build:
      name: "U: Scala ${{ matrix.scala }}"
      runs-on: ubuntu-24.04
      strategy:
        matrix:
          # These Scala versions must match those in the build.sbt
          scala: [2.13.16]
      steps:
        - name: install java
          uses: actions/setup-java@v3
          with:
            distribution: "zulu"
            java-version: "17"
        - uses: actions/checkout@v3
        - name: Setup Unity Catalog for testing
          run: |
            git clone https://github.com/TimothyW553/unitycatalog.git /tmp/unitycatalog
            cd /tmp/unitycatalog
            git checkout atomic-rtas
            ./build/sbt clean package publishM2
        - name: generate unidoc
          run: build/sbt "++ ${{ matrix.scala }}" unidoc
