name: "Delta Spark Source Ref"

on:
  pull_request:
    branches: [master, branch-*]
    paths-ignore:
      - '**.md'
      - '**.txt'
  workflow_dispatch:
    inputs:
      spark-source-ref:
        description: "Apache Spark source ref to test"
        required: true
        default: "b6bd005ac7549411ec4e7dc944d7a0e19fd56561"
        type: string
      spark-version:
        description: "Spark compatibility line used for Delta shims"
        required: true
        default: "4.2"
        type: string
      test-command:
        description: "SBT command to run after publishing Spark"
        required: true
        default: "spark/compile"
        type: string

permissions:
  contents: read

jobs:
  test:
    name: "[Non Blocking] Delta against Spark source ref"
    runs-on: ubuntu-24.04
    continue-on-error: true
    env:
      DEFAULT_SPARK_SOURCE_REF: "b6bd005ac7549411ec4e7dc944d7a0e19fd56561"
      DEFAULT_SPARK_VERSION: "4.2"
      SBT_INCLUDE_MAVEN_LOCAL: "true"
    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0

      - name: Set up JDK 17
        uses: actions/setup-java@17f84c3641ba7b8f6deff6309fc4c864478f5d62 # v3.14.1
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Resolve Spark source ref
        id: spark-ref
        env:
          INPUT_SPARK_SOURCE_REF: ${{ inputs['spark-source-ref'] }}
          INPUT_SPARK_VERSION: ${{ inputs['spark-version'] }}
          INPUT_TEST_COMMAND: ${{ inputs['test-command'] }}
        run: |
          SPARK_SOURCE_REF="${INPUT_SPARK_SOURCE_REF:-$DEFAULT_SPARK_SOURCE_REF}"
          SPARK_VERSION="${INPUT_SPARK_VERSION:-$DEFAULT_SPARK_VERSION}"
          TEST_COMMAND="${INPUT_TEST_COMMAND:-spark/compile}"
          git init /tmp/spark
          git -C /tmp/spark remote add origin https://github.com/apache/spark.git
          git -C /tmp/spark fetch --depth 1 origin "$SPARK_SOURCE_REF"
          git -C /tmp/spark checkout --detach FETCH_HEAD
          SPARK_SHA="$(git -C /tmp/spark rev-parse HEAD)"
          SPARK_SHORT_SHA="${SPARK_SHA:0:12}"
          if SPARK_BASE_VERSION="$(python3 - <<'PY'
          import re
          from pathlib import Path

          version_file = Path("/tmp/spark/version.sbt")
          if not version_file.exists():
              raise SystemExit(1)

          match = re.search(r'\bversion\s*:?=\s*"([^"]+)"', version_file.read_text())
          if not match:
              raise SystemExit(1)

          print(match.group(1).removesuffix("-SNAPSHOT"))
          PY
          )"; then
            :
          elif [[ "$SPARK_VERSION" =~ ^[0-9]+\.[0-9]+$ ]]; then
            SPARK_BASE_VERSION="${SPARK_VERSION}.0"
          else
            SPARK_BASE_VERSION="${SPARK_VERSION%-SNAPSHOT}"
          fi
          SPARK_ARTIFACT_VERSION="${SPARK_BASE_VERSION}-${SPARK_SHORT_SHA}-SNAPSHOT"
          echo "spark_source_ref=$SPARK_SOURCE_REF" >> "$GITHUB_OUTPUT"
          echo "spark_version=$SPARK_VERSION" >> "$GITHUB_OUTPUT"
          echo "spark_sha=$SPARK_SHA" >> "$GITHUB_OUTPUT"
          echo "spark_artifact_version=$SPARK_ARTIFACT_VERSION" >> "$GITHUB_OUTPUT"
          echo "test_command=$TEST_COMMAND" >> "$GITHUB_OUTPUT"
          echo "Resolved Spark source ref $SPARK_SOURCE_REF to $SPARK_SHA"

      - name: Restore Spark Maven cache
        id: spark-cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.m2/repository/org/apache/spark
          key: spark-m2-${{ runner.os }}-scala-2.13-${{ steps.spark-ref.outputs.spark_version }}-${{ steps.spark-ref.outputs.spark_sha }}-${{ hashFiles('project/scripts/build_spark_from_source.sh') }}

      - name: Fail on Spark cache miss
        if: steps.spark-cache.outputs.cache-hit != 'true'
        run: |
          echo "::error::Spark Maven artifacts were not found in the GitHub Actions cache. Run the Spark Source Artifact Cache workflow for ${{ steps.spark-ref.outputs.spark_source_ref }} first."
          exit 1

      - name: Verify restored Spark Maven artifacts
        env:
          SPARK_ARTIFACT_VERSION: ${{ steps.spark-ref.outputs.spark_artifact_version }}
        run: |
          missing=0
          for module in spark-sql_2.13 spark-core_2.13 spark-catalyst_2.13 spark-hive_2.13; do
            pom="$HOME/.m2/repository/org/apache/spark/$module/$SPARK_ARTIFACT_VERSION/$module-$SPARK_ARTIFACT_VERSION.pom"
            if [[ ! -f "$pom" ]]; then
              echo "::error::Missing restored Spark Maven artifact: $pom"
              missing=1
            fi
          done
          if [[ "$missing" != "0" ]]; then
            echo "The Spark cache was restored, but it does not contain the expected Maven artifacts. Re-run the Spark Source Artifact Cache workflow for ${{ steps.spark-ref.outputs.spark_source_ref }}."
            exit 1
          fi

      - name: Restore SBT cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.sbt
            ~/.ivy2
            ~/.cache/coursier
          key: delta-sbt-cache-spark-source-${{ steps.spark-ref.outputs.spark_version }}

      - name: Set up pinned Unity Catalog
        uses: ./.github/actions/setup-unitycatalog

      - name: Run Delta build
        run: |
          build/sbt \
            -DsparkVersion=${{ steps.spark-ref.outputs.spark_version }} \
            -DsparkCommit=${{ steps.spark-ref.outputs.spark_sha }} \
            -DsparkArtifactVersion=${{ steps.spark-ref.outputs.spark_artifact_version }} \
            "${{ steps.spark-ref.outputs.test_command }}"
